<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Accessibility: supports light/dark correctly -->
    <meta name="color-scheme" content="light dark" />

    <title>Gemini Poll Assistant</title>
  </head>
  <body>
    <!-- ✅ Accessibility: Skip Navigation -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- EXISTING ROOT -->
    <div id="root"></div>

    <!-- ✅ Skip‑link styles (do NOT remove existing CSS imports) -->
    <style>
      .skip-link {
        position: absolute;
        left: -9999px;
        top: auto;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }
      .skip-link:focus {
        left: 1rem;
        top: 1rem;
        width: auto;
        height: auto;
        padding: 0.75rem 1rem;
        background: #000;
        color: #fff;
        z-index: 10000;
        text-decoration: none;
      }

      :focus-visible {
        outline: 3px solid #2563eb;
        outline-offset: 2px;
      }
    </style>
  </body>
</html>
